name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # OIDC trusted publishing (TestPyPI/PyPI)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,openai,anthropic]"
          pip install build
      - name: Run tests
        run: pytest tests/ehrextract -m "not gpu"
      - name: Build sdist + wheel
        run: python -m build --sdist --wheel
      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true

      # OIDC trusted publishing -- pending publisher registered on TestPyPI
      # (project ehrextract, owner shifosss, workflow release.yml, no env).
      # attestations off here: both publish steps share dist/, and the
      # attestation files this step would generate make the real-PyPI step
      # fail with "distributions already have publish attestations".
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: false

      # Real PyPI publish (sign-off 2026-06-12; pending publisher
      # registered on pypi.org -- same five fields as TestPyPI).
      # Publishing is permanent: versions can be yanked, never reused.
      # Deliberately no skip-existing: a re-run of an already-published
      # version should fail loudly, not silently no-op.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
